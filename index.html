<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Productboard Roadmap",
  "schemaVersion": 1,
  "description": "Eftsure 2H 2026 roadmap — dynamic matrix built from ProductBoard components, products and regions."
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eftsure Roadmap — 2H 2026</title>
<style>
  :root {
    --eft:#f96a38; --sis:#7c3aed;
    --border:#e2e4ea; --bg:#f5f6f8; --text:#1a1a2e; --muted:#6b7280;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .topnav { background:#fff; border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topnav-left { display:flex; align-items:center; gap:10px; }
  .logo { width:28px; height:28px; background:linear-gradient(135deg,#f96a38,#e94e77); border-radius:7px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:13px; flex-shrink:0; }
  .topnav h1 { font-size:15px; font-weight:600; color:var(--text); }
  .badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; background:#f3f4f6; color:var(--muted); }
  .badge-live { background:#dcfce7; color:#15803d; }

  .table-wrap { overflow-x:auto; padding:16px 20px 40px; }
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); border:1px solid var(--border); }

  tr.obj-row td { font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:8px 14px; background:#f3f4f6; border-bottom:1px solid var(--border); color:var(--muted); border-left:4px solid #d1d5db; }

  td.region-cell { background:#fff; }

  .cards { display:flex; flex-direction:column; gap:4px; }
  .card { background:#fafbfc; border:1px solid #e8eaed; border-left:3px solid #e8eaed; border-radius:6px; padding:6px 26px 6px 10px; transition:box-shadow .15s; cursor:pointer; display:flex; align-items:center; gap:6px; min-height:0; }
  .card:hover { box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .card.team-eft { border-left-color:var(--eft); }
  .card.team-sis { border-left-color:var(--sis); }
  .card-name { font-size:11px; font-weight:500; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }

  .card-health { font-size:10px; font-weight:600; padding:1px 5px; border-radius:4px; white-space:nowrap; }
  .health-on-track        { background:#dcfce7; color:#15803d; }
  .health-needs-attention { background:#fef9c3; color:#854d0e; }
  .health-off-track       { background:#fee2e2; color:#dc2626; }
  .card-timeline { font-size:10px; color:#6b7280; background:#f3f4f6; padding:1px 5px; border-radius:4px; white-space:nowrap; }
  .empty-cell { color:#d1d5db; font-size:11px; }
  .card { cursor: grab; position:relative; }
  .card.dragging { opacity:.35; cursor:grabbing; box-shadow:none; }
  .card-dismiss { position:absolute; top:6px; right:7px; width:16px; height:16px; border-radius:50%; border:none; background:transparent; color:#9ca3af; font-size:13px; line-height:1; cursor:pointer; display:none; align-items:center; justify-content:center; padding:0; }
  .card:hover .card-dismiss { display:flex; }
  .card-dismiss:hover { background:#fee2e2; color:#dc2626; }
  .region-cell.drag-over { background:#eff6ff; outline:2px dashed #93c5fd; outline-offset:-2px; }
  .region-cell { min-height:48px; }

  .no-data { padding:48px 20px; text-align:center; color:var(--muted); font-size:13px; }

  /* Filter bar */
  .filter-bar { background:#fff; border-bottom:1px solid var(--border); padding:8px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .filter-group { display:flex; align-items:center; gap:6px; }
  .filter-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
  .filter-chip { font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; border:1px solid #e2e4ea; background:#f9fafb; color:var(--muted); cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:5px; user-select:none; }
  .filter-chip .ldot { width:7px; height:7px; border-radius:50%; }
  .filter-chip.active { border-color:transparent; }
  .filter-chip:hover { opacity:.85; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.visible { display:flex; }
  .modal { background:#fff; border-radius:12px; padding:28px; width:400px; max-width:94vw; box-shadow:0 20px 60px rgba(0,0,0,.15); text-align:center; }
  .modal-icon { font-size:32px; margin-bottom:10px; }
  .modal-msg  { font-size:14px; color:#374151; margin-bottom:16px; }
  .modal-err  { font-size:12px; color:#dc2626; margin-bottom:10px; display:none; }
  .modal-close { display:none; margin:0 auto; }
</style>
</head>

<div class="legend">

<div class="summary-bar" id="summaryBar" style="display:none">

<script>
// ── Global state ──
let rawData = {features:[], initiatives:[], objectives:[]};
let activeFilters = {
  teams:    new Set(['eft','sis']),
  statuses: new Set(['candidate','planned','inprogress','released']),
  regions:  new Set() // all regions active by default (empty = no filter)
};

const SUPABASE_URL  = 'https://fpbsjyefnitpplgrwopg.supabase.co';
const SUPABASE_ANON = 'sb_publishable_QQTrGagpQEdjVyiejGHsDg_56KML78l';
const SYNC_TOKEN    = 'YOUR_SYNC_PASSWORD';
const REGION_FIELD  = 'bd4b3406-ebbe-4a84-ae2b-1d3b9ed90474';

// Colour palette for regions (cycles for unknown ones)
const REGION_PALETTE = [
  {color:'#0ea5e9', bg:'#e0f2fe', border:'#7dd3fc'},
  {color:'#10b981', bg:'#dcfce7', border:'#6ee7b7'},
  {color:'#f59e0b', bg:'#fef3c7', border:'#fcd34d'},
  {color:'#8b5cf6', bg:'#ede9fe', border:'#c4b5fd'},
  {color:'#ec4899', bg:'#fce7f3', border:'#f9a8d4'},
  {color:'#f97316', bg:'#ffedd5', border:'#fdba74'},
];

function regionStyle(name) {
  const n = (name||'').toLowerCase();
  if (n.includes('anz')||n.includes('aus')||n.includes('au')) return REGION_PALETTE[0];
  if (n.includes('us')||n.includes('global')||n.includes('north am')) return REGION_PALETTE[1];
  if (n.includes('eu')||n.includes('europ')) return REGION_PALETTE[2];
  // Hash-based stable colour for unknown regions
  const h = [...(name||'')].reduce((a,c)=>a+c.charCodeAt(0),0);
  return REGION_PALETTE[3 + (h % (REGION_PALETTE.length - 3))];
}

// ── Region extraction from a feature ──
function getFeatureRegions(f) {
  const fld = f.fields || {};

  // 1. Custom field (v2 or if spread by edge function)
  const arr = fld[REGION_FIELD];
  if (Array.isArray(arr) && arr.length) return arr.map(r => r.name);

  // 2. Tags
  const tagNames = (fld.tags||[]).map(t=>(t.name||'').trim());
  const regionTags = tagNames.filter(t => {
    const tl = t.toLowerCase();
    return tl==='us'||tl.includes('anz')||tl.includes('au')||tl.includes('eu')||tl.includes('global');
  });
  if (regionTags.length) {
    return regionTags.map(t => {
      const tl = t.toLowerCase();
      if (tl==='us') return 'US & Global';
      if (tl.includes('anz')||tl.includes('au')) return 'ANZ';
      if (tl.includes('eu')) return 'Europe';
      return t;
    });
  }

  // 3. Name keywords
  const name = (fld.name||'').toLowerCase();
  if (name.includes(' us ')||name.includes('- us')||name.includes('for us')||name.includes('ofac')||name.includes('united states')) return ['US & Global'];
  if (name.includes('gdpr')||name.includes('europ')||name.includes(' eu ')||name.includes('germany')) return ['Europe'];
  if (name.includes('anz')||name.includes('australia')||name.includes('zepto')||name.includes('(au')||name.includes(' au,')) return ['ANZ'];

  return [];
}

// ── Build dynamic matrix from objectives → initiatives ──
function buildMatrix(features, initiatives, objectives) {
  // Build lookup maps
  const objMap = {};
  for (const o of (objectives||[])) objMap[o.id] = {id:o.id, name:o.name};

  const initMap = {};
  for (const i of (initiatives||[])) initMap[i.id] = {id:i.id, name:i.name, objectiveId:i.objectiveId};

  const INCLUDE = ['candidate','planned','in progress','released'];

  // Discover regions and build grid
  const regionOrder = [];
  const regionSet = new Set();
  const grid = {};      // objId -> initId -> regionName -> [items]
  const objInits = {};  // objId -> [initId] ordered by first appearance
  const stats = {candidate:0, planned:0, inprogress:0, released:0, unplaced:0};

  for (const f of (features||[])) {
    const fld = f.fields || {};
    if (f.type !== 'feature' || fld.archived) continue;
    const status = (fld.status?.name||'').toLowerCase();
    if (!INCLUDE.includes(status)) continue;

    if (status.includes('in progress')) stats.inprogress++;
    else if (status==='candidate') stats.candidate++;
    else if (status==='planned') stats.planned++;
    else if (status==='released') stats.released++;

    // Find initiative AND objective links from feature's own relationships
    const rels = f.relationships?.data || [];
    const initLinks = rels.filter(r => r.type==='link' && r.target?.type==='initiative').map(r => r.target.id);
    // Feature may directly link to objective too — use as fallback when initiative has no objectiveId
    const featureObjIds = rels.filter(r => r.type==='link' && r.target?.type==='objective').map(r => r.target.id);

    if (!initLinks.length) { stats.unplaced++; continue; }

    const regions = getFeatureRegions(f);
    if (!regions.length) { stats.unplaced++; continue; }

    // Register regions
    for (const r of regions) {
      if (!regionSet.has(r)) { regionSet.add(r); regionOrder.push(r); }
    }

    // Place in grid
    for (const initId of initLinks) {
      const init = initMap[initId];
      // Get objective from initiative map, OR directly from feature's objective link
      const objId = init?.objectiveId || featureObjIds[0] || null;
      if (!objId) continue;

      if (!grid[objId]) grid[objId] = {};
      if (!grid[objId][initId]) grid[objId][initId] = {};
      if (!objInits[objId]) objInits[objId] = [];
      if (!objInits[objId].includes(initId)) objInits[objId].push(initId);

      for (const r of regions) {
        if (!grid[objId][initId][r]) grid[objId][initId][r] = [];
        grid[objId][initId][r].push(buildItem(f));
      }
    }
  }

  // Sort regions: ANZ → US & Global → Europe → others
  const regions = [...regionOrder].sort((a,b) => {
    const s = n => { const l=n.toLowerCase(); return l.includes('anz')||l.includes('aus')?0:l.includes('us')||l.includes('global')?1:l.includes('eu')||l.includes('europ')?2:3; };
    return s(a)-s(b);
  });

  // Build ordered rows
  const rows = [];
  const OBJ_COLORS = ['#10b981','#3b82f6','#8b5cf6','#f59e0b','#ec4899','#f97316'];
  let colorIdx = 0;

  for (const objId of Object.keys(grid)) {
    const obj = objMap[objId] || {id:objId, name:'Other'};
    const color = OBJ_COLORS[colorIdx++ % OBJ_COLORS.length];
    const initRows = [];
    for (const initId of (objInits[objId]||[])) {
      if (!grid[objId]?.[initId]) continue;
      const init = initMap[initId] || {id:initId, name:'–'};
      const cells = {};
      for (const r of regions) cells[r] = grid[objId][initId][r] || [];
      if (Object.values(cells).some(a=>a.length>0)) initRows.push({init, cells});
    }
    if (initRows.length) rows.push({obj, color, inits: initRows});
  }

  return {rows, regions, stats};
}

function buildItem(f) {
  const fld = f.fields || {};
  const tf = fld.timeframe || {};
  return {
    name: fld.name || 'Untitled',
    team: 'eft',
    status: (fld.status?.name||'').toLowerCase(),
    health: fld.health || null,
    startDate: tf.startDate || fld.startDate || null,
    endDate: tf.endDate || fld.endDate || null,
    link: f.links?.html || fld.links?.html || null
  };
}

// ── Render ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function healthBadge(h) {
  if (!h||!h.status) return '';
  const map = {'onTrack':['health-on-track','● On track'],'offTrack':['health-off-track','✖ Off track'],'atRisk':['health-needs-attention','⚠ At risk']};
  const [cls,lbl] = map[h.status]||['',''];
  return cls ? `<span class="card-health ${cls}">${lbl}</span>` : '';
}

function statusDot(st) {
  const map = {
    'candidate':  ['#60a5fa','Candidate'],
    'planned':    ['#facc15','Planned'],
    'inprogress': ['#fb923c','In Progress'],
    'released':   ['#4ade80','Released'],
  };
  const key = (st||'').replace(/ /g,'').toLowerCase();
  const [color, label] = map[key] || ['#9ca3af', st||''];
  return `<span title="${label}" style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>`;
}

function timelineBadge(item) {
  const fmt = iso => {
    if (!iso) return null;
    const d = new Date(iso);
    if (isNaN(d.getTime())) return null;
    return `Q${Math.floor(d.getMonth()/3)+1} ${d.getFullYear()}`;
  };
  const fs=fmt(item.startDate), fe=fmt(item.endDate);
  if (!fs&&!fe) return '';
  // Same quarter → single label
  if (fs && fe && fs===fe) return `<span class="card-timeline">${fs}</span>`;
  if (fs&&fe) return `<span class="card-timeline">${fs} – ${fe}</span>`;
  return `<span class="card-timeline">${fe||fs}</span>`;
}

function cardHTML(item) {
  const teamCls = item.team==='sis' ? 'team-sis' : 'team-eft';
  const st = (item.status||'').replace(/ /g,'').toLowerCase();
  const health = st!=='released' ? healthBadge(item.health) : '';
  const timeline = timelineBadge(item);
  return `<div class="card ${teamCls}" ${item.link?`onclick="window.open('${esc(item.link)}','_blank')"`:''}>
    ${statusDot(item.status)}
    <span class="card-name" title="${esc(item.name)}">${esc(item.name)}</span>
    <div class="card-meta">${health}${timeline}</div>
    <button class="card-dismiss" onclick="event.stopPropagation();this.closest('.card').remove()" title="Hide">×</button>
  </div>`;
}

function render({rows, regions, stats}) {
  // Build header dynamically
  const head = document.getElementById('tableHead');
  let hrow = '<tr><th class="col-init"></th>';
  for (const r of regions) {
    const s = regionStyle(r);
    hrow += `<th style="border-top:3px solid ${s.color};color:${s.color}">${esc(r)}</th>`;
  }
  hrow += '</tr>';
  head.innerHTML = hrow;

  const body = document.getElementById('tableBody');
  if (!rows.length) {
    body.innerHTML = `<tr><td colspan="${regions.length+1}" class="no-data">No features placed — ensure features are linked to Initiatives in ProductBoard, then Sync</td></tr>`;
    return;
  }

  let html = '';
  for (const {obj, color, inits} of rows) {
    html += `<tr class="obj-row"><td colspan="${regions.length+1}" style="border-left:4px solid ${color};color:${color}">${esc(obj.name)}</td></tr>`;
    for (const {init, cells} of inits) {
      html += `<tr class="init-row"><td class="init-name" style="border-left:3px solid ${color}">${esc(init.name)}</td>`;
      for (const r of regions) {
        const items = cells[r] || [];
        html += items.length
          ? `<td class="region-cell"><div class="cards">${items.map(cardHTML).join('')}</div></td>`
          : `<td class="region-cell"><span class="empty-cell">—</span></td>`;
      }
      html += '</tr>';
    }
  }
  body.innerHTML = html;

  if (stats) {
    document.getElementById('summaryBar').style.display = 'flex';
    document.getElementById('cnt-inprog').textContent    = `${stats.inprogress} In Progress`;
    document.getElementById('cnt-candidate').textContent  = `${stats.candidate} Candidate`;
    document.getElementById('cnt-planned').textContent    = `${stats.planned} Planned`;
    document.getElementById('cnt-released').textContent   = `${stats.released} Released`;
    const up = document.getElementById('cnt-unplaced');
    if (stats.unplaced) { up.textContent=`${stats.unplaced} No Initiative`; up.style.display='inline-flex'; }
    else up.style.display = 'none';
  }
  // Enable drag and drop after render
  initDragDrop();
}

// ── Drag and drop ──
let dragged = null;

function initDragDrop() {
  document.querySelectorAll('.card').forEach(card => {
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', e => {
      dragged = card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.region-cell').forEach(c => c.classList.remove('drag-over'));
      dragged = null;
    });
  });

  document.querySelectorAll('td.region-cell').forEach(cell => {
    cell.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragged) return;
      cell.classList.add('drag-over');
      // Live reorder preview
      const cardsEl = cell.querySelector('.cards') || (() => {
        const d = document.createElement('div'); d.className='cards'; cell.innerHTML=''; cell.appendChild(d); return d;
      })();
      const after = getAfterElement(cardsEl, e.clientY);
      if (after == null) cardsEl.appendChild(dragged);
      else cardsEl.insertBefore(dragged, after);
    });
    cell.addEventListener('dragleave', e => {
      if (!cell.contains(e.relatedTarget)) cell.classList.remove('drag-over');
    });
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
    });
  });
}

function getAfterElement(container, y) {
  const els = [...container.querySelectorAll('.card:not(.dragging)')];
  return els.reduce((closest, el) => {
    const box = el.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    return offset < 0 && offset > closest.offset ? {offset, el} : closest;
  }, {offset: Number.NEGATIVE_INFINITY, el: null}).el;
}

// ── Filter bar ──
const STATUS_CHIPS = [
  {key:'candidate',  label:'Candidate',   color:'#60a5fa', bg:'#eff6ff'},
  {key:'planned',    label:'Planned',     color:'#ca8a04', bg:'#fef9c3'},
  {key:'inprogress', label:'In Progress', color:'#ea580c', bg:'#fff7ed'},
  {key:'released',   label:'Released',    color:'#16a34a', bg:'#f0fdf4'},
];
const TEAM_CHIPS = [
  {key:'eft', label:'EFTsure', color:'#f96a38', bg:'#fff4f0'},
  {key:'sis', label:'Sis ID',  color:'#7c3aed', bg:'#f5f3ff'},
];

function buildFilterBar(regions) {
  const bar = document.getElementById('filterBar');
  if (!bar) return;

  const chipHTML = (chips, filterKey, activeSet) => chips.map(c => {
    const on = activeSet.has(c.key);
    const style = on
      ? `background:${c.bg};color:${c.color};border-color:${c.color}`
      : '';
    return `<span class="filter-chip${on?' active':''}" style="${style}"
      onclick="toggleFilter('${filterKey}','${c.key}',this,'${c.color}','${c.bg}')"
      data-key="${c.key}">
      <span class="ldot" style="background:${c.color}"></span>${c.label}
    </span>`;
  }).join('');

  const regionChips = regions.map(r => {
    const s = regionStyle(r);
    const on = activeFilters.regions.size === 0 || activeFilters.regions.has(r);
    const style = on ? `background:${s.bg};color:${s.color};border-color:${s.color}` : '';
    return `<span class="filter-chip${on?' active':''}" style="${style}"
      onclick="toggleRegion('${esc(r)}',this,'${s.color}','${s.bg}')"
      data-region="${esc(r)}">
      <span class="ldot" style="background:${s.color}"></span>${esc(r)}
    </span>`;
  }).join('');

  bar.innerHTML = `
    <div class="filter-group"><span class="filter-label">Team</span>${chipHTML(TEAM_CHIPS,'teams',activeFilters.teams)}</div>
    <div class="filter-group"><span class="filter-label">Status</span>${chipHTML(STATUS_CHIPS,'statuses',activeFilters.statuses)}</div>
    ${regions.length ? `<div class="filter-group"><span class="filter-label">Region</span>${regionChips}</div>` : ''}
  `;
  bar.style.display = 'flex';
}

function toggleFilter(filterKey, key, el, color, bg) {
  const set = activeFilters[filterKey];
  if (set.has(key)) { set.delete(key); el.classList.remove('active'); el.style.cssText=''; }
  else { set.add(key); el.classList.add('active'); el.style.cssText=`background:${bg};color:${color};border-color:${color}`; }
  applyFilters();
}

function toggleRegion(region, el, color, bg) {
  const set = activeFilters.regions;
  if (set.has(region)) { set.delete(region); el.classList.remove('active'); el.style.cssText=''; }
  else { set.add(region); el.classList.add('active'); el.style.cssText=`background:${bg};color:${color};border-color:${color}`; }
  applyFilters();
}

function applyFilters() {
  const {features, initiatives, objectives} = rawData;
  const filtered = features.filter(f => {
    const fld = f.fields || {};
    // Status filter
    const st = (fld.status?.name||'').replace(/ /g,'').toLowerCase();
    if (!activeFilters.statuses.has(st)) return false;
    // Team filter (based on instance field if present, default 'eft')
    const team = f.instance === 'sisid' ? 'sis' : 'eft';
    if (!activeFilters.teams.has(team)) return false;
    // Region filter (empty set = all regions)
    if (activeFilters.regions.size > 0) {
      const fRegions = getFeatureRegions(f);
      if (!fRegions.some(r => activeFilters.regions.has(r))) return false;
    }
    return true;
  });
  render(buildMatrix(filtered, initiatives, objectives));
}

// ── Parse payload from Supabase or Sync response ──
function parsePayload(raw) {
  if (!raw) return {features:[], initiatives:[], objectives:[]};
  if (Array.isArray(raw)) return {features:raw, initiatives:[], objectives:[]};
  return {
    features:    raw.features    || [],
    initiatives: raw.initiatives || [],
    objectives:  raw.objectives  || []
  };
}

// ── Supabase load ──
async function loadFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/roadmap_cache?select=instance,features,updated_at`,
      {headers:{apikey:SUPABASE_ANON,Authorization:'Bearer '+SUPABASE_ANON}});
    const rows = await res.json();
    if (Array.isArray(rows) && rows.length) {
      const row = rows.find(r=>r.instance==='eftsure') || rows[0];
      if (row?.features) {
        const {features, initiatives, objectives} = parsePayload(row.features);
        if (features.length) {
          rawData = {features, initiatives, objectives};
          const d = new Date(row.updated_at);
          document.getElementById('lastSync').textContent = 'Synced '+d.toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
          document.getElementById('dataBadge').textContent = 'Live data';
          document.getElementById('dataBadge').className = 'badge badge-live';
          const result = buildMatrix(features, initiatives, objectives);
          buildFilterBar(result.regions);
          render(result);
          return;
        }
      }
    }
    document.getElementById('lastSync').textContent = 'No data — click Sync';
  } catch(e) {
    document.getElementById('lastSync').textContent = 'Could not load — click Sync';
  }
}

// ── Sync ──
function openSync() {
  document.getElementById('syncIcon').textContent = '⇄';
  document.getElementById('syncMsg').textContent = 'Fetching from ProductBoard…';
  document.getElementById('syncErr').style.display = 'none';
  document.getElementById('syncClose').style.display = 'none';
  document.getElementById('syncModal').classList.add('visible');
  doSync();
}
function closeSyncModal() { document.getElementById('syncModal').classList.remove('visible'); }

async function doSync() {
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/sync-productboard`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON},
      body:JSON.stringify({sync_token:SYNC_TOKEN, instance:'eftsure'})
    });
    const result = await res.json();
    if (result.error) throw new Error(result.error);

    const {features, initiatives, objectives} = parsePayload(result);
    rawData = {features, initiatives, objectives};
    const now = new Date();
    document.getElementById('lastSync').textContent = 'Synced '+now.toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    document.getElementById('dataBadge').textContent = 'Live data';
    document.getElementById('dataBadge').className = 'badge badge-live';
    const matResult = buildMatrix(features, initiatives, objectives);
    buildFilterBar(matResult.regions);
    render(matResult);

    document.getElementById('syncIcon').textContent = '✓';
    document.getElementById('syncMsg').textContent = `${result.count} features synced.`;
    setTimeout(closeSyncModal, 1500);
  } catch(e) {
    document.getElementById('syncIcon').textContent = '✖';
    document.getElementById('syncMsg').textContent = 'Sync failed.';
    document.getElementById('syncErr').textContent = e.message;
    document.getElementById('syncErr').style.display = 'block';
    document.getElementById('syncClose').style.display = 'inline-flex';
  }
}

async function refresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = '↻ Refreshing…';
  await loadFromSupabase();
  btn.disabled = false; btn.textContent = '↻ Refresh';
}

document.getElementById('syncModal').addEventListener('click', e => {
  if (e.target === document.getElementById('syncModal')) closeSyncModal();
});

loadFromSupabase();
</script>
