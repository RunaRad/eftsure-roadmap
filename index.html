  thead th.region-us { border-top:3px solid var(--us); color:var(--us); }
  thead th.region-eu { border-top:3px solid var(--eu); color:var(--eu); }

  /* Instance badge */

  /* Status badge */
  .card-status { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; display:flex; align-items:center; gap:3px; }
  .st-candidate  { background:#eff6ff; color:#2563eb; }
  .st-planned    { background:#fef9c3; color:#ca8a04; }

  .card-health   { font-size:10px; font-weight:600; padding:2px 5px; border-radius:4px; }

  .empty-cell { color:#d1d5db; font-size:11px; padding:4px 0; display:block; }

  /* ── Modal (matches kanban) ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.visible { display:flex; }
  .modal { background:#fff; border-radius:12px; padding:28px; width:400px; max-width:94vw; box-shadow:0 20px 60px rgba(0,0,0,.15); text-align:center; }
  .modal-icon { font-size:32px; margin-bottom:10px; }

  .modal-err  { font-size:12px; color:#dc2626; margin-bottom:10px; display:none; }

<script>
const SUPABASE_URL  = 'https://fpbsjyefnitpplgrwopg.supabase.co';
const SUPABASE_ANON = 'sb_publishable_QQTrGagpQEdjVyiejGHsDg_56KML78l';
const SYNC_TOKEN    = 'YOUR_SYNC_PASSWORD';

const REGION_FIELD_ID = 'bd4b3406-ebbe-4a84-ae2b-1d3b9ed90474';
const REGION_LOOKUP = {
  'anz':'au','australia':'au','au':'au','anz/au':'au',
  'us & global':'us','us&global':'us','usa':'us','us':'us','global enterprise':'us','north america':'us','global':'us',
  'europe':'eu','eu':'eu','emea':'eu','european':'eu'
};

function getRegionCol(feature) {
  const fld = feature.fields || {};
  const arr = fld[REGION_FIELD_ID];
  if (Array.isArray(arr) && arr.length) {
    for (const r of arr) {
      const key = (r.name||'').toLowerCase().trim();
      if (REGION_LOOKUP[key]) return REGION_LOOKUP[key];
      for (const [k,v] of Object.entries(REGION_LOOKUP)) if (key.includes(k)) return v;
    }
  }
  for (const t of (fld.tags||[]).map(t=>(t.name||'').toLowerCase())) {
    if (REGION_LOOKUP[t]) return REGION_LOOKUP[t];
    if (t.includes('aus')||t==='anz'||t==='au') return 'au';
    if (t.includes('eu')||t.includes('europ')) return 'eu';
    if (t==='us') return 'us';
  }
  return null;
}

const PARENT_MAP = {
  '6a7c23a5':{obj:'growth',init:'Sanctions Screening'},
  'f964e860':{obj:'custsat',init:'Verification Performance'},
  '0e24e07f':{obj:'custsat',init:'Verification Performance'},
  'ce40a57c':{obj:'custsat',init:'Verification Performance'},
  '7e530ace':{obj:'custsat',init:'Customer Asks'},
  '2c3f2f74':{obj:'foundation',init:'International Verifications'},
  '5bfcc122':{obj:'growth',init:'Fraud Signals'},
  '2d249293':{obj:'growth',init:'Individuals Verification'},
  'dfe464b3':{obj:'growth',init:'Individuals Verification'},
  '08398664':{obj:'growth',init:'Global Entity Support'},
  '2b6b959a':{obj:'growth',init:'Supplier Viability Monitoring'},
};
const KEYWORD_RULES = [
  {words:['sanction'],obj:'growth',init:'Sanctions Screening'},
  {words:['fraud','fraud scenario'],obj:'growth',init:'Fraud Signals'},
  {words:['supplier viab','creditprotect'],obj:'growth',init:'Supplier Viability Monitoring'},
  {words:['individual','identity & pay'],obj:'growth',init:'Individuals Verification'},
  {words:['global entit','singapore','canada'],obj:'growth',init:'Global Entity Support'},
  {words:['localiz','germany','netherlands'],obj:'growth',init:'Localization'},
  {words:['avs','confirmation of payee','address verif','govcode','cop in ap','cop & abn'],obj:'custsat',init:'Verification Performance'},
  {words:['mask','masking','liberty mutual'],obj:'custsat',init:'Customer Asks'},
  {words:['self-certif'],obj:'custsat',init:'Self-Certification'},
  {words:['international verif','200+ countr','50+ countr','60+ countr','gdpr'],obj:'foundation',init:'International Verifications'},
  {words:['routing number','swift','iban'],obj:'foundation',init:'Data Validation'},
  {words:['otrs','rationali','churnzero','approver','payment file'],obj:'foundation',init:'Tenant Configuration & Rights Mgmt'},
  {words:['enhanced verif engine','anomaly detect','waterfall bav','distributable db'],obj:'foundation',init:'Global Payee DB & Ver. Engine'},
];

function getInitiative(f) {
  const parentId = ((f.relationships?.data||[]).find(r=>r.type==='parent')?.target?.id||'').substring(0,8);
  if (PARENT_MAP[parentId]) return PARENT_MAP[parentId];
  const name = (f.fields?.name||'').toLowerCase();
  for (const r of KEYWORD_RULES) if (r.words.some(w=>name.includes(w))) return {obj:r.obj,init:r.init};
  return null;
}

const SEED = [
  {id:'growth',label:'Growth',initiatives:[
    {name:'Individuals Verification',
      au:[{name:'Individual Person Verification',team:'eft',status:'candidate'}],
      us:[{name:'Natural Persons Expansion',team:'sis',status:'candidate'},{name:'Rights/Entitlements Mgmt',team:'sis',status:'candidate'}],
      eu:[{name:'Natural Persons → IPV',team:'sis',status:'candidate'}]},
    {name:'Sanctions Screening',
      au:[{name:'Sanctions Screening — OFAC',team:'eft',status:'candidate'},{name:'AU/NZ Sanctions Screening',team:'eft',status:'candidate'}],
      us:[{name:'Sanctions Screening — OFAC w/ Eftsure Data',team:'eft',status:'inprogress'},{name:'Global Sanctions Screening',team:'eft',status:'candidate'}],
      eu:[{name:'EU Sanctions Screening',team:'sis',status:'candidate'}]},
    {name:'Global Entity Support',
      au:[{name:'Singapore Regionalization',team:'eft',status:'candidate'}],
      us:[{name:'Global Entity Support',team:'eft',status:'candidate'}],eu:[]},
    {name:'Supplier Viability Monitoring',
      au:[{name:'Supplier Risk Mgmt',team:'eft',status:'candidate'}],us:[],eu:[]},
    {name:'Fraud Signals',
      au:[{name:'Fraud Check Failure Handling',team:'eft',status:'candidate'},{name:'Review & Update Fraud Checks',team:'eft',status:'candidate'}],
      us:[],
      eu:[{name:'Closed/Unreachable/Fraudulent Accounts data',team:'sis',status:'candidate'},{name:'Negative company checks',team:'sis',status:'candidate'}]},
    {name:'Localization',au:[],us:[],eu:[{name:'Germany, Netherlands…',team:'sis',status:'candidate'}]}
  ]},
  {id:'custsat',label:'Customer Sat',initiatives:[
    {name:'Verification Performance',
      au:[{name:'Improve AVS Pass Rate for Onboardings',team:'eft',status:'candidate'},{name:'AVS support for Change Requests',team:'eft',status:'candidate'},{name:'CoP & ABN support',team:'sis',status:'candidate'}],
      us:[],
      eu:[{name:'Verification by Name/address (Optional ID)',team:'eft',status:'candidate'}]},
    {name:'Customer Asks',au:[],us:[{name:'Data Masking — Liberty Mutual',team:'eft',status:'candidate'}],eu:[]},
    {name:'Self-Certification',au:[],us:[],eu:[{name:'Certified by Client',team:'sis',status:'candidate'}]}
  ]},
  {id:'foundation',label:'Foundation',initiatives:[
    {name:'Tenant Configuration & Rights Mgmt',
      au:[{name:'…',team:'eft',status:'candidate'}],us:[{name:'Rights Mgmt',team:'eft',status:'candidate'}],eu:[{name:'…',team:'eft',status:'candidate'}]},
    {name:'International Verifications',
      au:[{name:'Expand to all 200 Countries',team:'eft',status:'planned'}],us:[],eu:[]},
    {name:'Data Validation',
      au:[],us:[{name:'Routing Number & SWIFT Lookup',team:'eft',status:'candidate'}],eu:[]},
    {name:'Global Payee DB & Ver. Engine',
      au:[],
      us:[{name:'Enhanced Verification Engine',team:'eft',status:'candidate'},{name:'Anomaly Detection Pilot',team:'eft',status:'candidate'},{name:'Globally Distributable DB Architecture',team:'eft',status:'candidate'}],
      eu:[]}
  ]}
];

function buildMatrix(rawFeatures) {
  if (!rawFeatures||!rawFeatures.length) return {data:SEED,stats:null};
  const matrix = SEED.map(o=>({...o,initiatives:o.initiatives.map(i=>({...i,au:[],us:[],eu:[]}))}));
  const dynamic = {};
  const stats = {candidate:0,planned:0,inprogress:0,released:0,unplaced:0};
  for (const f of rawFeatures) {
    if (f.type!=='feature'||f.fields?.archived) continue;
    const fld=f.fields||{}, name=fld.name||'Untitled';
    const status=(fld.status?.name||'').toLowerCase();
    const col=getRegionCol(f), place=getInitiative(f);
    if (status.includes('in progress')) stats.inprogress++;
    else if (status==='candidate') stats.candidate++;
    else if (status==='planned') stats.planned++;
    else if (status==='released') stats.released++;
    if (!col||!place) { stats.unplaced++; continue; }
    const tf=fld.timeframe||{};
    const item={
      name, team:'eft', status:status.replace(' ',''),
      health: fld.health||null,
      startDate: tf.startDate||fld.startDate||null,
      endDate:   tf.endDate  ||fld.endDate  ||null
    };
    const objData=matrix.find(o=>o.id===place.obj);
    if (objData) {
      const initData=objData.initiatives.find(i=>i.name===place.init);
      if (initData) { initData[col].push(item); continue; }
    }
    const key=`${place.obj}.${place.init}`;
    if (!dynamic[key]) dynamic[key]={name:place.init,_obj:place.obj,au:[],us:[],eu:[]};
    dynamic[key][col].push(item);
  }
  for (const init of Object.values(dynamic)) {
    const objData=matrix.find(o=>o.id===init._obj);
    if (objData) objData.initiatives.push({name:init.name,au:init.au,us:init.us,eu:init.eu});
  }
  return {data:matrix,stats};
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function statusCls(s) {
  s=(s||'').replace(' ','').toLowerCase();
  if (s==='released') return 'st-released';
  if (s.includes('inprogress')||s==='inprogress') return 'st-inprogress';
  if (s==='planned') return 'st-planned';
  return 'st-candidate';
}
function statusLabel(s) {
  s=(s||'').toLowerCase();
  if (s.includes('progress')) return 'In Progress';
  if (s==='released') return 'Released';
  if (s==='planned') return 'Planned';
  return 'Candidate';
}

function healthBadge(h) {
  if (!h||!h.status) return '';
  const map={'onTrack':['health-on-track','● On track'],'offTrack':['health-off-track','✖ Off track'],'atRisk':['health-needs-attention','⚠ At risk']};
  const [cls,lbl]=map[h.status]||['',''];
  return cls ? `<span class="card-health ${cls}">${lbl}</span>` : '';
}

function timelineBadge(item) {
  const fmt = iso => {
    if (!iso) return null;
    const d=new Date(iso);
    if (isNaN(d.getTime())) return null;
    return d.toLocaleString('en-AU',{month:'short',year:'numeric'});
  };
  const fs=fmt(item.startDate), fe=fmt(item.endDate);
  if (!fs&&!fe) return '';
  const st=(item.status||'').replace(' ','').toLowerCase();
  if (st==='inprogress') {
    return [fs&&`<span class="card-timeline">▶ ${fs}</span>`,fe&&`<span class="card-timeline">⏹ ${fe}</span>`].filter(Boolean).join('');
  }
  if (fs&&fe) return `<span class="card-timeline">📅 ${fs} – ${fe}</span>`;
  return `<span class="card-timeline">📅 ${fe?'Due '+fe:'From '+fs}</span>`;
}

function cardHTML(item) {
  const instCls = item.team==='sis' ? 'inst-sis' : 'inst-eft';
  const instLbl = item.team==='sis' ? 'SIS' : 'EFT';
  const st=(item.status||'').replace(' ','').toLowerCase();
  const showTimeline = st==='planned'||st==='inprogress'||st==='released';
  return `<div class="card">
    <div class="card-name">${esc(item.name)}</div>
    <div class="card-meta">
      <span class="card-instance ${instCls}">${instLbl}</span>
      ${st!=='released' ? healthBadge(item.health) : ''}
      ${showTimeline ? timelineBadge(item) : ''}
    </div>
  </div>`;
}

function cellHTML(items) {
  if (!items||!items.length) return `<td class="region-cell"><span class="empty-cell">—</span></td>`;
  return `<td class="region-cell"><div class="cards">${items.map(cardHTML).join('')}</div></td>`;
}

function render(result) {
  const data=result.data||result, stats=result.stats||null;
  let html='';
  for (const obj of data) {
    html+=`<tr class="obj-row ${obj.id}"><td>${esc(obj.label)}</td><td colspan="4" style="background:#f3f4f6"></td></tr>`;
    for (const init of obj.initiatives) {
      const accent=obj.id==='custsat'?'custsat':obj.id;
      html+=`<tr class="init-row">
        <td class="init-name" colspan="2" style="border-left:4px solid var(--${accent})">${esc(init.name)}</td>
        ${cellHTML(init.au)}${cellHTML(init.us)}${cellHTML(init.eu)}
      </tr>`;
    }
  }
  document.getElementById('tableBody').innerHTML=html;
  if (stats) {
    document.getElementById('summaryBar').style.display='flex';
    document.getElementById('cnt-inprog').textContent=`${stats.inprogress} In Progress`;
    document.getElementById('cnt-candidate').textContent=`${stats.candidate} Candidate`;
    document.getElementById('cnt-planned').textContent=`${stats.planned} Planned`;
    document.getElementById('cnt-released').textContent=`${stats.released} Released`;
    if (stats.unplaced) {
      document.getElementById('chip-unplaced').style.display='flex';
      document.getElementById('cnt-unplaced').textContent=`${stats.unplaced} No Region`;
    }
  }
}

async function loadFromSupabase() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/roadmap_cache?select=instance,features,updated_at`,
      {headers:{apikey:SUPABASE_ANON,Authorization:'Bearer '+SUPABASE_ANON}});
    const rows = await res.json();
    if (Array.isArray(rows)&&rows.some(r=>r.features?.length)) {
      const all=rows.flatMap(r=>(r.features||[]).map(f=>({...f,instance:r.instance})));
      const d=new Date(rows[0].updated_at);
      document.getElementById('lastSync').textContent='Synced '+d.toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      document.getElementById('dataBadge').textContent='Live data';
      document.getElementById('dataBadge').className='badge badge-live';
      render(buildMatrix(all));
    } else {
      document.getElementById('lastSync').textContent='Showing seed data';
      render({data:SEED,stats:null});
    }
  } catch(e) {
    document.getElementById('lastSync').textContent='Showing seed data';
    render({data:SEED,stats:null});
  }
}

function openSync() {
  document.getElementById('syncIcon').textContent='⇄';
  document.getElementById('syncMsg').textContent='Fetching from ProductBoard…';
  document.getElementById('syncErr').style.display='none';
  document.getElementById('syncClose').style.display='none';
  document.getElementById('syncModal').classList.add('visible');
  doSync();
}
function closeSyncModal() { document.getElementById('syncModal').classList.remove('visible'); }

async function doSync() {
  try {
    const res=await fetch(`${SUPABASE_URL}/functions/v1/sync-productboard`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON},
      body:JSON.stringify({sync_token:SYNC_TOKEN,instance:'eftsure'})
    });
    const result=await res.json();
    if (result.error) throw new Error(result.error);
    const all=(result.features||[]).map(f=>({...f,instance:'eftsure'}));
    const now=new Date();
    document.getElementById('lastSync').textContent='Synced '+now.toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    document.getElementById('dataBadge').textContent='Live data';
    document.getElementById('dataBadge').className='badge badge-live';
    render(buildMatrix(all));
    document.getElementById('syncIcon').textContent='✓';
    document.getElementById('syncMsg').textContent=`${result.count} features synced.`;
    setTimeout(closeSyncModal,1500);
  } catch(e) {
    document.getElementById('syncIcon').textContent='✖';
    document.getElementById('syncMsg').textContent='Sync failed.';
    document.getElementById('syncErr').textContent=e.message;
    document.getElementById('syncErr').style.display='block';
    document.getElementById('syncClose').style.display='inline-flex';
  }
}

async function refresh() {
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='↻ Refreshing…';
  await loadFromSupabase();
  btn.disabled=false; btn.textContent='↻ Refresh';
}

document.getElementById('syncModal').addEventListener('click',e=>{if(e.target===document.getElementById('syncModal'))closeSyncModal();});
window.addEventListener('load',loadFromSupabase);
</script>
</body>
